<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Not Submitted Students</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

.header{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    padding:25px;
    border-radius:18px;
    margin-bottom:25px;
}

.table{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.row{
    display:grid;
    grid-template-columns:2fr 2fr;
    padding:18px;
    border-bottom:1px solid #e2e8f0;
}

.head{
    background:#0f172a;
    color:white;
    font-weight:600;
}

.empty{
    padding:25px;
    text-align:center;
    color:#64748b;
}

</style>
</head>
<body>

<div class="header">
    <h1>Not Submitted Students</h1>
</div>

<div class="table">

    <div class="row head">
        <div>Name</div>
        <div>Roll Number</div>
    </div>

    <div id="rows"></div>

</div>

<script>

async function refreshAccessToken() {

    const refresh = localStorage.getItem("refresh");
    if (!refresh) return false;

    try {
        const res = await fetch("/token/refresh/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refresh })
        });

        if (!res.ok) return false;

        const data = await res.json();

        localStorage.setItem("access", data.access);

        if (data.refresh) {
            localStorage.setItem("refresh", data.refresh);
        }

        return true;

    } catch (err) {
        console.error(err);
        return false;
    }
}


/* UNIFIED AUTH FETCH */
async function authFetch(url, options = {}) {

    let access = localStorage.getItem("access");

    let response = await fetch(url, {
        ...options,
        headers: {
            ...(options.body ? {} : {}), // GET safe
            ...(options.headers || {}),
            ...(access ? { "Authorization": "Bearer " + access } : {})
        }
    });

    if (response.status === 401) {

        const refreshed = await refreshAccessToken();

        if (!refreshed) {
            localStorage.removeItem("access");
            localStorage.removeItem("refresh");
            window.location.href = "/accounts/login/";
            return response;
        }

        access = localStorage.getItem("access");

        response = await fetch(url, {
            ...options,
            headers: {
                ...(options.headers || {}),
                ...(access ? { "Authorization": "Bearer " + access } : {})
            }
        });
    }

    return response;
}


/* SAFE ID EXTRACTION */
function getAssignmentId() {
    const parts = window.location.pathname.split("/").filter(Boolean);
    return parts[parts.length - 1];
}

const assignmentId = getAssignmentId();

const rows = document.getElementById("rows");


/* LOAD DATA */
async function loadNotSubmitted() {

    const res = await authFetch(`/assignments/api/not-submitted/${assignmentId}/`);

    if (res.status === 401) {
        alert("Session expired. Please login again.");
        window.location.href = "/accounts/login/";
        return;
    }

    const data = await res.json().catch(() => []);

    rows.innerHTML = "";

    if (!data || data.length === 0) {
        rows.innerHTML = `
            <div class="empty">
                All students have submitted this assignment.
            </div>
        `;
        return;
    }

    data.forEach(student => {

        rows.innerHTML += `
            <div class="row">
                <div>${student.student_name}</div>
                <div>${student.roll_number}</div>
            </div>
        `;
    });
}


/* INIT */
loadNotSubmitted();

</script>

</body>
</html>
