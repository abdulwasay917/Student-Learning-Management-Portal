<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submission Detail</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

.card{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

h1{
    margin-bottom:20px;
    color:#0f172a;
}

.item{
    margin-bottom:18px;
}

.label{
    font-weight:600;
    color:#0f172a;
    margin-bottom:5px;
}

.value{
    color:#475569;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 18px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
}

.btn:hover{
    background:#1d4ed8;
}

</style>
</head>
<body>

<div class="card">

    <h1>Submission Detail</h1>

    <div class="item">
        <div class="label">Student Name</div>
        <div class="value" id="student_name"></div>
    </div>

    <div class="item">
        <div class="label">Roll Number</div>
        <div class="value" id="roll_number"></div>
    </div>

    <div class="item">
        <div class="label">Assignment</div>
        <div class="value" id="assignment_title"></div>
    </div>

    <div class="item">
        <div class="label">Submitted At</div>
        <div class="value" id="submitted_at"></div>
    </div>

    <a
        id="file_link"
        class="btn"
        target="_blank"
    >
        View Assignment File
    </a>

</div>

<script>

function authFetch(url, options = {}) {
    const token = localStorage.getItem("access");

    return fetch(url, {
        ...options,
        headers: {
            "Content-Type": "application/json",
            ...(options.headers || {}),
            ...(token ? { "Authorization": "Bearer " + token } : {})
        }
    });
}

// ================= GET ID =================

const submissionId = window.location.pathname.split("/")[3];

// ================= ELEMENTS =================

const setText = (id, value) => {
    document.getElementById(id).innerText = value || "N/A";
};

// ================= LOAD DATA =================

authFetch(`/assignments/api/submission/${submissionId}/`)
.then(async res => {

    if (res.status === 401) {
        alert("Session expired. Please login again.");
        window.location.href = "/accounts/login/";
        return;
    }

    if (!res.ok) {
        throw new Error("Failed to load submission");
    }

    return res.json();
})
.then(data => {

    if (!data) return;

    setText("student_name", data.student_name);
    setText("roll_number", data.roll_number);
    setText("assignment_title", data.assignment_title);

    if (data.submitted_at) {
        setText(
            "submitted_at",
            new Date(data.submitted_at).toLocaleString()
        );
    } else {
        setText("submitted_at", "Not available");
    }

    const fileLink = document.getElementById("file_link");

    if (data.file) {
        fileLink.href = data.file;
        fileLink.style.display = "inline-block";
    } else {
        fileLink.style.display = "none";
    }

})
.catch(err => {

    console.log(err);

    setText("student_name", "Error loading data");

});

</script>

</body>
</html>
