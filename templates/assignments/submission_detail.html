<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submission Detail</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

.card{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

h1{
    margin-bottom:20px;
    color:#0f172a;
}

.item{
    margin-bottom:18px;
}

.label{
    font-weight:600;
    color:#0f172a;
    margin-bottom:5px;
}

.value{
    color:#475569;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 18px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
}

.btn:hover{
    background:#1d4ed8;
}

</style>
</head>
<body>

<div class="card">

    <h1>Submission Detail</h1>

    <div class="item">
        <div class="label">Student Name</div>
        <div class="value" id="student_name"></div>
    </div>

    <div class="item">
        <div class="label">Roll Number</div>
        <div class="value" id="roll_number"></div>
    </div>

    <div class="item">
        <div class="label">Assignment</div>
        <div class="value" id="assignment_title"></div>
    </div>

    <div class="item">
        <div class="label">Submitted At</div>
        <div class="value" id="submitted_at"></div>
    </div>

    <a
        id="file_link"
        class="btn"
        target="_blank"
    >
        View Assignment File
    </a>

</div>

<script>

async function refreshAccessToken() {

    const refresh = localStorage.getItem("refresh");
    if (!refresh) return false;

    try {
        const res = await fetch("/token/refresh/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refresh })
        });

        if (!res.ok) return false;

        const data = await res.json();

        localStorage.setItem("access", data.access);

        if (data.refresh) {
            localStorage.setItem("refresh", data.refresh);
        }

        return true;

    } catch (err) {
        console.error(err);
        return false;
    }
}


/* UNIFIED AUTH FETCH */
async function authFetch(url, options = {}) {

    let access = localStorage.getItem("access");

    let response = await fetch(url, {
        ...options,
        headers: {
            ...(options.headers || {}),
            ...(access ? { "Authorization": "Bearer " + access } : {})
        }
    });

    if (response.status === 401) {

        const refreshed = await refreshAccessToken();

        if (!refreshed) {
            localStorage.removeItem("access");
            localStorage.removeItem("refresh");
            window.location.href = "/accounts/login/";
            return response;
        }

        access = localStorage.getItem("access");

        response = await fetch(url, {
            ...options,
            headers: {
                ...(options.headers || {}),
                ...(access ? { "Authorization": "Bearer " + access } : {})
            }
        });
    }

    return response;
}


/* SAFE ID EXTRACTION */
function getSubmissionId() {
    const parts = window.location.pathname.split("/").filter(Boolean);
    return parts[parts.length - 1];
}

const submissionId = getSubmissionId();


/* SAFE TEXT SETTER */
const setText = (id, value) => {
    const el = document.getElementById(id);
    if (el) el.innerText = value || "N/A";
};


/* LOAD SUBMISSION */
async function loadSubmission() {

    const res = await authFetch(`/assignments/api/submission/${submissionId}/`);

    if (res.status === 401) {
        alert("Session expired. Please login again.");
        window.location.href = "/accounts/login/";
        return;
    }

    const data = await res.json().catch(() => null);

    if (!data) {
        setText("student_name", "Error loading data");
        return;
    }

    setText("student_name", data.student_name);
    setText("roll_number", data.roll_number);
    setText("assignment_title", data.assignment_title);

    if (data.submitted_at) {
        setText("submitted_at", new Date(data.submitted_at).toLocaleString());
    } else {
        setText("submitted_at", "Not available");
    }

    const fileLink = document.getElementById("file_link");

    if (data.file) {
        fileLink.href = data.file;
        fileLink.style.display = "inline-block";
    } else {
        fileLink.style.display = "none";
    }
}


/* INIT */
loadSubmission();

</script>

</body>
</html>
