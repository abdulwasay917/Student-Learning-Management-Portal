<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Assignment</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

.card{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

h1{
    margin-bottom:20px;
    color:#0f172a;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:600;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:15px;
}

textarea{
    min-height:180px;
    resize:vertical;
}

button{
    margin-top:20px;
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#1d4ed8;
}

</style>
</head>
<body>

<div class="card">

    <h1>Create Assignment</h1>

    <label>Title</label>
    <input
        type="text"
        id="title"
    >

    <label>Assignment Statement</label>
    <textarea
        id="statement"
    ></textarea>

    <button onclick="createAssignment()">
        Create Assignment
    </button>

</div>

<script>

/* =========================
   TOKEN HELPERS
========================= */
function getAccessToken() {
    return localStorage.getItem("access_token");
}

function getRefreshToken() {
    return localStorage.getItem("refresh_token");
}

/* =========================
   REFRESH TOKEN
========================= */
async function refreshAccessToken() {

    const refresh = getRefreshToken();
    if (!refresh) return false;

    try {

        const res = await fetch("/token/refresh/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ refresh })
        });

        if (!res.ok) return false;

        const data = await res.json();

        localStorage.setItem("access_token", data.access);

        if (data.refresh) {
            localStorage.setItem("refresh_token", data.refresh);
        }

        return true;

    } catch (err) {
        console.error(err);
        return false;
    }
}

/* =========================
   AUTH FETCH (UNIFIED)
========================= */
async function authFetch(url, options = {}) {

    let access = getAccessToken();

    let response = await fetch(url, {
        ...options,
        headers: {
            ...(options.headers || {}),
            "Content-Type": "application/json",
            "Accept": "application/json",
            ...(access ? {
                "Authorization": "Bearer " + access
            } : {})
        }
    });

    if (response.status === 401) {

        const refreshed = await refreshAccessToken();

        if (!refreshed) {
            localStorage.removeItem("access_token");
            localStorage.removeItem("refresh_token");
            window.location.href = "/accounts/login/";
            return;
        }

        access = getAccessToken();

        response = await fetch(url, {
            ...options,
            headers: {
                ...(options.headers || {}),
                "Content-Type": "application/json",
                "Accept": "application/json",
                "Authorization": "Bearer " + access
            }
        });
    }

    return response;
}

/* =========================
   VALIDATION
========================= */
function validateForm(title, statement) {

    if (!title || !statement) {
        return "Please fill all fields";
    }

    return null;
}

/* =========================
   CREATE ASSIGNMENT
========================= */
async function createAssignment() {

    const title = document.getElementById("title").value.trim();
    const statement = document.getElementById("statement").value.trim();

    const error = validateForm(title, statement);

    if (error) {
        alert(error);
        return;
    }

    try {

        const res = await authFetch("/assignments/api/create/", {
            method: "POST",
            body: JSON.stringify({
                title,
                statement
            })
        });

        const data = await res.json().catch(() => ({}));

        if (!res || res.status === 401) {
            alert("Session expired. Please login again.");
            window.location.href = "/accounts/login/";
            return;
        }

        if (!res.ok) {
            alert(data.error || data.detail || "Something went wrong");
            return;
        }

        alert(data.message || "Assignment created successfully");

        window.location.href = "/assignments/";

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}

</script>

</body>
</html>
