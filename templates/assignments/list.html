<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignments</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #f4f6f9;
            padding: 30px;
        }

        .header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 25px;
            border-radius: 18px;
            margin-bottom: 25px;
        }

        .back-btn {
            background: #2563eb;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
        }

        .back-btn:hover {
            background: #1d4ed8;
        }

        .container {
            display: grid;
            grid-template-columns:repeat(auto-fit, minmax(360px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 22px;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, .08);
        }

        .card:hover {
            transform: translateY(-4px);
            transition: .3s;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
        }

        .sub {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .statement {
            margin-top: 15px;
            color: #334155;
            line-height: 1.6;
        }

        .meta {
            margin-top: 12px;
            font-size: 13px;
            color: #64748b;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .actions button {
            border: none;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
        }

        .submit {
            background: #16a34a;
        }

        .submitted {
            background: #2563eb;
        }

        .notsubmitted {
            background: #7c3aed;
        }

        .delete {
            background: #dc2626;
        }

        .create-btn {
            position: fixed;
            right: 25px;
            bottom: 25px;
            background: #2563eb;
            color: white;
            padding: 16px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: none;
        }

    </style>
</head>
<body>

<div class="header">

    <div style="display:flex;justify-content:space-between;align-items:center;gap:15px;flex-wrap:wrap;">

        <div>
            <h1>Live Meetings</h1>
            <p>Join your active classes before they expire</p>
        </div>

        <a href="/core/dashboard/" class="back-btn">
            ← Back to Dashboard
        </a>

    </div>

</div>

<div id="assignments" class="container"></div>

<a
        href="/assignments/create/"
        class="create-btn"
        id="createBtn"
>
    + Create Assignment
</a>

<script>

/* =========================
   TOKEN HELPERS
========================= */
function getAccessToken() {
    return localStorage.getItem("access_token");
}

function getRefreshToken() {
    return localStorage.getItem("refresh_token");
}

/* =========================
   REFRESH TOKEN
========================= */
async function refreshAccessToken() {

    const refresh = getRefreshToken();
    if (!refresh) return false;

    try {

        const res = await fetch("/token/refresh/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ refresh })
        });

        if (!res.ok) return false;

        const data = await res.json();

        localStorage.setItem("access_token", data.access);

        if (data.refresh) {
            localStorage.setItem("refresh_token", data.refresh);
        }

        return true;

    } catch (err) {
        console.error(err);
        return false;
    }
}

/* =========================
   AUTH FETCH (UNIFIED CORE)
========================= */
async function authFetch(url, options = {}) {

    let access = getAccessToken();

    let response = await fetch(url, {
        ...options,
        headers: {
            ...(options.headers || {}),
            "Accept": "application/json",
            ...(access ? {
                "Authorization": "Bearer " + access
            } : {})
        }
    });

    if (response.status === 401) {

        const refreshed = await refreshAccessToken();

        if (!refreshed) {
            localStorage.removeItem("access_token");
            localStorage.removeItem("refresh_token");
            window.location.href = "/accounts/login/";
            return;
        }

        access = getAccessToken();

        response = await fetch(url, {
            ...options,
            headers: {
                ...(options.headers || {}),
                "Accept": "application/json",
                "Authorization": "Bearer " + access
            }
        });
    }

    return response;
}

/* =========================
   GLOBAL STATE
========================= */
let user = {};

/* =========================
   LOAD USER
========================= */
async function loadUser() {

    try {

        const res = await authFetch("/core/api/dashboard/");

        if (!res || res.status === 401) {
            window.location.href = "/accounts/login/";
            return;
        }

        user = await res.json().catch(() => ({}));

        if (user.role === "teacher" || user.is_superuser) {
            document.getElementById("createBtn").style.display = "block";
        }

    } catch (err) {
        console.error(err);
    }
}

/* =========================
   LOAD ASSIGNMENTS
========================= */
async function loadAssignments() {

    try {

        const res = await authFetch("/assignments/api/");

        if (!res || res.status === 401) {
            alert("Session expired");
            window.location.href = "/accounts/login/";
            return;
        }

        const data = await res.json().catch(() => []);

        const box = document.getElementById("assignments");
        box.innerHTML = "";

        if (!data || data.length === 0) {
            box.innerHTML = "<p>No assignments found</p>";
            return;
        }

        data.forEach(a => {

            let buttons = "";

            if (user.role === "student") {

                buttons = a.submitted
                    ? `<button class="submitted" onclick="submitAssignment(${a.id})">Edit Submission</button>`
                    : `<button class="submit" onclick="submitAssignment(${a.id})">Submit Assignment</button>`;

            } else {

                const canManage =
                    user.is_superuser ||
                    user.id === a.creator_id;

                buttons = `
                    <button class="submitted" onclick="submitted(${a.id})">Submitted</button>
                    <button class="notsubmitted" onclick="notSubmitted(${a.id})">Not Submitted</button>
                    ${canManage ? `<button class="delete" onclick="deleteAssignment(${a.id})">Delete</button>` : ""}
                `;
            }

            box.innerHTML += `
                <div class="card">

                    <div class="title">${a.title}</div>

                    <div class="sub">
                        Teacher: ${a.teacher_name}
                    </div>

                    <div class="statement">
                        ${a.statement}
                    </div>

                    <div class="meta">
                        Created: ${new Date(a.created_at).toLocaleString()}
                    </div>

                    <div class="actions">
                        ${buttons}
                    </div>

                </div>
            `;
        });

    } catch (err) {
        console.error(err);
    }
}

/* =========================
   DELETE ASSIGNMENT
========================= */
async function deleteAssignment(id) {

    if (!confirm("Are you sure you want to delete this assignment?")) return;

    try {

        const res = await authFetch(`/assignments/api/delete/${id}/`, {
            method: "DELETE"
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
            alert(data.error || "Delete failed");
            return;
        }

        alert(data.message || "Deleted successfully");

        loadAssignments();

    } catch (err) {
        console.error(err);
        alert("Request failed");
    }
}

/* =========================
   NAVIGATION
========================= */
function submitted(id) {
    window.location.href = `/assignments/submitted/${id}/`;
}

function notSubmitted(id) {
    window.location.href = `/assignments/not-submitted/${id}/`;
}

/* =========================
   SUBMIT ASSIGNMENT
========================= */
function submitAssignment(id) {

    const input = document.createElement("input");
    input.type = "file";

    input.onchange = async function () {

        const file = input.files[0];

        const form = new FormData();
        form.append("file", file);

        try {

            const res = await authFetch(`/assignments/api/submit/${id}/`, {
                method: "POST",
                body: form
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
                alert(data.error || "Submission failed");
                return;
            }

            alert(data.message || "Assignment submitted");

            loadAssignments();

        } catch (err) {
            console.error(err);
            alert("Network error");
        }
    };

    input.click();
}

/* =========================
   INIT
========================= */
loadUser().then(loadAssignments);

</script>

</body>
</html>
