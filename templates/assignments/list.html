<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignments</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #f4f6f9;
            padding: 30px;
        }

        .header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 25px;
            border-radius: 18px;
            margin-bottom: 25px;
        }

        .container {
            display: grid;
            grid-template-columns:repeat(auto-fit, minmax(360px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 22px;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, .08);
        }

        .card:hover {
            transform: translateY(-4px);
            transition: .3s;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
        }

        .sub {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .statement {
            margin-top: 15px;
            color: #334155;
            line-height: 1.6;
        }

        .meta {
            margin-top: 12px;
            font-size: 13px;
            color: #64748b;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .actions button {
            border: none;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
        }

        .submit {
            background: #16a34a;
        }

        .submitted {
            background: #2563eb;
        }

        .notsubmitted {
            background: #7c3aed;
        }

        .delete {
            background: #dc2626;
        }

        .create-btn {
            position: fixed;
            right: 25px;
            bottom: 25px;
            background: #2563eb;
            color: white;
            padding: 16px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: none;
        }

    </style>
</head>
<body>

<div class="header">
    <h1>Assignments</h1>
    <p>View and submit assignments</p>
</div>

<div id="assignments" class="container"></div>

<a
        href="/assignments/create/"
        class="create-btn"
        id="createBtn"
>
    + Create Assignment
</a>

<script>

async function refreshAccessToken() {

    const refresh = localStorage.getItem("refresh");
    if (!refresh) return false;

    try {
        const res = await fetch("/token/refresh/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refresh })
        });

        if (!res.ok) return false;

        const data = await res.json();

        localStorage.setItem("access", data.access);

        if (data.refresh) {
            localStorage.setItem("refresh", data.refresh);
        }

        return true;

    } catch (err) {
        console.error(err);
        return false;
    }
}


/* UNIFIED AUTH FETCH */
async function authFetch(url, options = {}) {

    let access = localStorage.getItem("access");

    let response = await fetch(url, {
        ...options,
        headers: {
            ...(options.body instanceof FormData ? {} : { "Content-Type": "application/json" }),
            ...(options.headers || {}),
            ...(access ? { "Authorization": "Bearer " + access } : {})
        }
    });

    if (response.status === 401) {

        const refreshed = await refreshAccessToken();

        if (!refreshed) {
            localStorage.removeItem("access");
            localStorage.removeItem("refresh");
            window.location.href = "/accounts/login/";
            return response;
        }

        access = localStorage.getItem("access");

        response = await fetch(url, {
            ...options,
            headers: {
                ...(options.body instanceof FormData ? {} : { "Content-Type": "application/json" }),
                ...(options.headers || {}),
                ...(access ? { "Authorization": "Bearer " + access } : {})
            }
        });
    }

    return response;
}


let user = {};


/* USER */
async function loadUser() {

    const res = await authFetch("/core/api/dashboard/");

    if (res.status === 401) {
        window.location.href = "/accounts/login/";
        return;
    }

    user = await res.json().catch(() => ({}));

    if (user.role === "teacher" || user.is_superuser) {
        document.getElementById("createBtn").style.display = "block";
    }
}


/* ASSIGNMENTS */
async function loadAssignments() {

    const res = await authFetch("/assignments/api/");

    if (res.status === 401) {
        alert("Session expired");
        window.location.href = "/accounts/login/";
        return;
    }

    const data = await res.json().catch(() => []);

    let box = document.getElementById("assignments");
    box.innerHTML = "";

    if (!data || data.length === 0) {
        box.innerHTML = "<p>No assignments found</p>";
        return;
    }

    data.forEach(a => {

        let buttons = "";

        if (user.role === "student") {

            buttons = a.submitted
                ? `<button class="submitted" onclick="submitAssignment(${a.id})">Edit Submission</button>`
                : `<button class="submit" onclick="submitAssignment(${a.id})">Submit Assignment</button>`;
        }
        else {

            let canManage =
                user.is_superuser ||
                user.id === a.creator_id;

            buttons = `
                <button class="submitted" onclick="submitted(${a.id})">Submitted</button>
                <button class="notsubmitted" onclick="notSubmitted(${a.id})">Not Submitted</button>
                ${canManage ? `<button class="delete" onclick="del(${a.id})">Delete</button>` : ""}
            `;
        }

        box.innerHTML += `
            <div class="card">

                <div class="title">${a.title}</div>

                <div class="sub">
                    Teacher: ${a.teacher_name}
                </div>

                <div class="statement">
                    ${a.statement}
                </div>

                <div class="meta">
                    Created: ${new Date(a.created_at).toLocaleString()}
                </div>

                <div class="actions">
                    ${buttons}
                </div>

            </div>
        `;
    });
}


/* DELETE */
function del(id) {

    if (!confirm("Delete assignment?")) return;

    authFetch(`/assignments/api/delete/${id}/`, {
        method: "DELETE"
    })
    .then(async res => {

        if (!res.ok) {
            alert("Delete failed");
            return;
        }

        loadAssignments();
    })
    .catch(err => console.error(err));
}


/* NAVIGATION */
function submitted(id) {
    window.location.href = `/assignments/submitted/${id}/`;
}

function notSubmitted(id) {
    window.location.href = `/assignments/not-submitted/${id}/`;
}


/* SUBMIT FILE */
function submitAssignment(id) {

    let input = document.createElement("input");
    input.type = "file";

    input.onchange = async function () {

        let file = input.files[0];

        let form = new FormData();
        form.append("file", file);

        const res = await authFetch(`/assignments/api/submit/${id}/`, {
            method: "POST",
            body: form
        });

        if (!res.ok) {
            alert("Submission failed");
            return;
        }

        alert("Assignment submitted");
        loadAssignments();
    };

    input.click();
}


/* INIT */
loadUser().then(loadAssignments);

</script>

</body>
</html>
