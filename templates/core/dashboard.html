<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LMS Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:#f8fafc}
.navbar{background:#0f172a;color:#fff;padding:15px 25px;display:flex;justify-content:space-between}
.nav-right{display:flex;gap:15px;align-items:center}
.logout-btn{background:#dc2626;color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer}
.container{display:flex}
.sidebar{width:240px;background:#111827;color:#fff;height:100vh;padding:20px}
.sidebar a{display:block;color:#fff;text-decoration:none;padding:12px;border-radius:8px;margin-bottom:8px}
.sidebar a:hover{background:#1f2937}
.main{flex:1;padding:30px}
.card{background:#fff;padding:25px;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.info{margin-top:8px}
.badge{display:inline-block;margin-top:10px;padding:6px 12px;background:#2563eb;color:#fff;border-radius:20px}
.section-title{margin-top:20px;color:#2563eb}
</style>
</head>
<body>
<div class="navbar">
<div><b>LMS Portal</b></div>
<div class="nav-right"><span id="navName"></span><button class="logout-btn" onclick="logoutUser()">Logout</button></div>
</div>
<div class="container">
<div class="sidebar">
<a href="/core/dashboard/">Dashboard</a>
<a href="/meetings/">Meetings</a>
<a href="/assignments/">Assignments</a>
<div id="admin-links"></div>
</div>
<div class="main">
<div class="card">
<h2 id="welcome">Loading...</h2>
<div class="info"><b>Name:</b> <span id="name"></span></div>
<div class="info"><b>Username:</b> <span id="username"></span></div>
<div class="info"><b>Email:</b> <span id="email"></span></div>
<div class="info"><b>Phone:</b> <span id="phone"></span></div>
<div class="badge" id="role"></div>
<div id="extra-info"></div>
</div>
</div>
</div>
<script>
function authFetch(url, options={}){
 const token=localStorage.getItem("access");
 return fetch(url,{
   ...options,
   headers:{
     ...(options.headers||{}),
     "Accept":"application/json",
     ...(token?{"Authorization":"Bearer "+token}:{})
   }
 });
}
authFetch("/core/api/dashboard/")
.then(async res=>{
 if(res.status===401){location.href="/accounts/login/";return null;}
 return await res.json();
})
.then(data=>{
 if(!data)return;
 welcome.innerText="Welcome "+data.name;
 navName.innerText=data.name;
 name.innerText=data.name;
 username.innerText=data.username;
 email.innerText=data.email;
 phone.innerText=data.phone||"Not Provided";
 role.innerText=(data.role||"").toUpperCase();
 let links="";
 if(data.is_superuser){
   links+=`<a href="/accounts/create-user/">Create User</a>
   <a href="/accounts/teachers/">Teachers</a>
   <a href="/accounts/students/">Students</a>`;
 }else if(data.role==="teacher"){
   links+=`<a href="/accounts/students/">Students</a>`;
 }
 document.getElementById("admin-links").innerHTML=links;
 const extra=document.getElementById("extra-info");
 if(data.role==="teacher"){
   extra.innerHTML=`<h3 class="section-title">Teacher Info</h3>
   <p><b>Expertise:</b> ${data.teacher?.expertise||"Not Added"}</p>
   <p><b>Bio:</b> ${data.teacher?.bio||"Not Added"}</p>`;
 }else if(data.role==="student"){
   extra.innerHTML=`<h3 class="section-title">Student Info</h3>
   <p><b>Roll No:</b> ${data.student?.roll_number||"Not Assigned"}</p>`;
 }
})
.catch(console.error);
function logoutUser(){
 localStorage.removeItem("access");
 localStorage.removeItem("refresh");
 location.href="/accounts/login/";
}
</script>
</body>
</html>
