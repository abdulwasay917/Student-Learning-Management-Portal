<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:#f8fafc;
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:#0f172a;
    color:white;
    padding:25px;
    position:fixed;
    height:100vh;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
    font-size:24px;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:white;
    padding:14px;
    margin-bottom:10px;
    border-radius:10px;
    transition:.3s;
}

.sidebar a:hover{
    background:#1e293b;
}

.logout-btn{
    margin-top:30px;
    background:#dc2626;
}

.logout-btn:hover{
    background:#b91c1c;
}

/* Main Content */

.main{
    margin-left:260px;
    flex:1;
    padding:30px;
}

/* Welcome Card */

.top-card{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.top-card h1{
    color:#0f172a;
    margin-bottom:10px;
}

.top-card p{
    color:#64748b;
}

/* Stats Cards */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.stat-card{
    background:white;
    padding:20px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.stat-card h3{
    color:#0f172a;
    margin-bottom:10px;
}

.stat-card p{
    color:#64748b;
}

/* User Info */

.info-card{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.info-card h2{
    margin-bottom:20px;
    color:#0f172a;
}

.info-card p{
    margin-bottom:10px;
    color:#334155;
}

.section-title{
    margin-top:25px;
    margin-bottom:15px;
    color:#2563eb;
}

.loading{
    text-align:center;
    padding:50px;
}

@media(max-width:768px){

    .sidebar{
        width:220px;
    }

    .main{
        margin-left:220px;
    }
}

</style>

</head>
<body>

<!-- Sidebar -->

<div class="sidebar">

    <h2>LMS</h2>

    <a href="#">Dashboard</a>

    <a href="/meetings/">Meeting</a>

    <a href="#">Assignments</a>

    <a href="#">Profile</a>

    <a href="#" class="logout-btn" onclick="logoutUser()">
        Logout
    </a>

</div>

<!-- Main Content -->

<div class="main">

    <div class="top-card">

        <h1 id="welcome">
            Loading...
        </h1>

        <p>
            Welcome to your LMS Dashboard
        </p>

    </div>

    <div class="stats">

        <div class="stat-card">
            <h3>Meeting</h3>
            <p>0</p>
        </div>

        <div class="stat-card">
            <h3>Assignments</h3>
            <p>0</p>
        </div>

        <div class="stat-card">
            <h3>Notifications</h3>
            <p>0</p>
        </div>

    </div>

    <div class="info-card">

        <h2>User Information</h2>

        <p>
            <strong>Name:</strong>
            <span id="name"></span>
        </p>

        <p>
            <strong>Username:</strong>
            <span id="username"></span>
        </p>

        <p>
            <strong>Email:</strong>
            <span id="email"></span>
        </p>

        <p>
            <strong>Phone:</strong>
            <span id="phone"></span>
        </p>

        <p>
            <strong>Role:</strong>
            <span id="role"></span>
        </p>

        <div id="extra-info"></div>

    </div>

</div>

<script>

fetch("/core/api/dashboard/")

.then(res => res.json())

.then(data => {

    document.getElementById(
        "welcome"
    ).innerText =
        "Welcome, " + data.name;

    document.getElementById(
        "name"
    ).innerText =
        data.name;

    document.getElementById(
        "username"
    ).innerText =
        data.username;

    document.getElementById(
        "email"
    ).innerText =
        data.email;

    document.getElementById(
        "phone"
    ).innerText =
        data.phone || "Not Provided";

    document.getElementById(
        "role"
    ).innerText =
        data.role;

    const extra =
        document.getElementById(
            "extra-info"
        );

    if(data.role === "teacher"){

        extra.innerHTML = `

            <h3 class="section-title">
                Teacher Information
            </h3>

            <p>
                <strong>Expertise:</strong>
                ${data.teacher?.expertise || "Not Added"}
            </p>

            <p>
                <strong>Bio:</strong>
                ${data.teacher?.bio || "Not Added"}
            </p>

        `;
    }

    if(data.role === "student"){

        extra.innerHTML = `

            <h3 class="section-title">
                Student Information
            </h3>

            <p>
                <strong>Roll Number:</strong>
                ${data.student?.roll_number || "Not Assigned"}
            </p>

        `;
    }

})

.catch(error => {

    console.log(error);

    document.getElementById(
        "welcome"
    ).innerText =
        "Unable to load dashboard";

});

function logoutUser(){

    fetch("/accounts/api/logout/",{
        method:"POST"
    })

    .then(() => {

        window.location.href =
            "/accounts/login/";

    });

}

</script>

</body>
</html>
