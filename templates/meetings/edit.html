<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Meeting</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f6f9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.card{
    background:white;
    padding:30px;
    width:420px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

/* Title */
.card h2{
    margin-bottom:20px;
    color:#0f172a;
    text-align:center;
}

/* Inputs */
input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:1px solid #e2e8f0;
    border-radius:10px;
    font-size:14px;
    outline:none;
    transition:.2s;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

/* Button */
button{
    width:100%;
    padding:14px;
    margin-top:18px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

/* Message */
#msg{
    margin-top:15px;
    text-align:center;
    font-size:14px;
    font-weight:500;
}

/* Loading text */
.loading{
    text-align:center;
    color:#64748b;
    font-size:14px;
    margin-top:10px;
}

</style>

</head>
<body>

<div class="card">

<h2>Edit Meeting</h2>

<div id="loading" class="loading">Loading meeting data...</div>

<input id="title" placeholder="Meeting Title">
<input id="link" placeholder="Meeting Link">

<button onclick="updateMeeting()">Update Meeting</button>

<p id="msg"></p>

</div>

<script>

/* =========================
   AUTH TOKEN
========================= */
function getAccessToken() {
    return localStorage.getItem("access_token");
}

/* =========================
   MESSAGE
========================= */
function showMsg(text, type = "error") {
    const msg = document.getElementById("msg");
    msg.innerText = text;
    msg.style.color = type === "success" ? "#16a34a" : "#dc2626";
}

/* =========================
   GET ID
========================= */
const id = window.location.pathname.split("/").filter(Boolean).pop();

/* =========================
   LOAD MEETING
========================= */
async function loadMeeting() {

    const loading = document.getElementById("loading");

    try {

        const res = await fetch(`/meetings/api/${id}/`, {
            headers: {
                "Content-Type": "application/json",
                ...(getAccessToken()
                    ? {
                        "Authorization": "Bearer " + getAccessToken()
                    }
                    : {})
            }
        });

        if (res.status === 401) {
            window.location.href = "/accounts/login/";
            return;
        }

        const meeting = await res.json().catch(() => null);

        if (!meeting) {
            loading.innerText = "Meeting not found";
            return;
        }

        document.getElementById("title").value = meeting.title || "";
        document.getElementById("link").value = meeting.link || "";

        loading.style.display = "none";

    } catch (err) {

        console.error(err);
        loading.innerText = "Error loading meeting";
    }
}

/* =========================
   VALIDATION
========================= */
function validate(data) {

    if (!data.title || !data.link) {
        return "All fields are required";
    }

    return null;
}

/* =========================
   UPDATE MEETING
========================= */
async function updateMeeting() {

    const title = document.getElementById("title").value.trim();
    const link = document.getElementById("link").value.trim();
    const btn = document.querySelector("button");

    const data = { title, link };

    const error = validate(data);
    if (error) {
        showMsg(error, "error");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Updating...";

    try {

        const res = await fetch(`/meetings/api/update/${id}/`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                ...(getAccessToken()
                    ? {
                        "Authorization": "Bearer " + getAccessToken()
                    }
                    : {})
            },
            body: JSON.stringify(data)
        });

        const result = await res.json().catch(() => ({}));

        if (!res.ok) {
            showMsg(result.error || "Update failed", "error");
            return;
        }

        showMsg("Meeting updated successfully!", "success");

        setTimeout(() => {
            window.location.href = "/meetings/";
        }, 900);

    } catch (err) {

        console.error(err);
        showMsg("Network error", "error");

    } finally {

        btn.disabled = false;
        btn.innerText = "Update Meeting";
    }
}

/* =========================
   INIT
========================= */
loadMeeting();

</script>

</body>
</html>
