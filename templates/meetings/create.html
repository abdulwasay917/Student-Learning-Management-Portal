<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Meeting</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* Card */

.card{
    background:white;
    padding:35px;
    width:100%;
    max-width:450px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.card h2{
    margin-bottom:20px;
    color:#0f172a;
}

/* Inputs */

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #d1d5db;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

/* Button */

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#msg{
    margin-top:10px;
    color:green;
    text-align:center;
}

</style>

</head>
<body>

<div class="card">

    <h2>Create Meeting</h2>

    <input type="text" id="title" placeholder="Meeting Title">

    <input type="url" id="link" placeholder="Meeting Link">

    <button onclick="createMeeting()">
        Create
    </button>

    <p id="msg"></p>

</div>

<script>

function getCookie(name){
    let cookieValue = null;
    if(document.cookie){
        document.cookie.split(';').forEach(c=>{
            if(c.trim().startsWith(name+'=')){
                cookieValue = decodeURIComponent(c.trim().substring(name.length+1));
            }
        });
    }
    return cookieValue;
}

function createMeeting(){

    fetch("/meetings/api/create/",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken":getCookie("csrftoken")
        },
        body:JSON.stringify({
            title:document.getElementById("title").value,
            link:document.getElementById("link").value
        })
    })

    .then(res=>res.json())
    .then(data=>{

        if(data.id){
            document.getElementById("msg").innerText =
                "Meeting Created Successfully!";
        }
        else{
            document.getElementById("msg").innerText =
                data.error || "Error creating meeting";
        }

    });

}

</script>

</body>
</html>
