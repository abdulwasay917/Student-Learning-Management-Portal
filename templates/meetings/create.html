<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Meeting</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.card{
    background:white;
    padding:30px;
    border-radius:18px;
    width:420px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

/* TITLE */
h2{
    margin-bottom:20px;
    color:#0f172a;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:14px;
}

/* BUTTON */
button{
    width:100%;
    margin-top:18px;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* MESSAGE */
#msg{
    margin-top:12px;
    font-size:14px;
    color:#16a34a;
    font-weight:600;
    text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h2>Create Meeting</h2>

<input id="title" placeholder="Meeting Title">
<input id="link" placeholder="Meeting Link">

<button onclick="createMeeting()">Create Meeting</button>

<p id="msg"></p>

</div>

<script>

/* =========================
   AUTH TOKEN
========================= */
function getAccessToken() {
    return localStorage.getItem("access_token");
}

/* =========================
   SHOW MESSAGE
========================= */
function showMsg(text, color = "error") {

    const msg = document.getElementById("msg");
    msg.innerText = text;

    msg.style.color = color === "success" ? "#16a34a" : "#dc2626";
}

/* =========================
   CREATE MEETING
========================= */
async function createMeeting() {

    const title = document.getElementById("title").value.trim();
    const link = document.getElementById("link").value.trim();

    if (!title || !link) {
        showMsg("All fields are required", "error");
        return;
    }

    const btn = document.querySelector("button");

    btn.disabled = true;
    btn.innerText = "Creating...";

    try {

        const res = await fetch("/meetings/api/create/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                ...(getAccessToken()
                    ? {
                        "Authorization": "Bearer " + getAccessToken()
                    }
                    : {})
            },
            body: JSON.stringify({ title, link })
        });

        if (res.status === 401) {
            window.location.href = "/accounts/login/";
            return;
        }

        const data = await res.json().catch(() => ({}));

        if (res.status !== 201) {
            showMsg(data.error || "Something went wrong", "error");
            return;
        }

        showMsg("Meeting created! Redirecting...", "success");

        setTimeout(() => {
            window.location.href = "/meetings/";
        }, 800);

    } catch (err) {

        console.error(err);
        showMsg("Server error", "error");

    } finally {

        btn.disabled = false;
        btn.innerText = "Create Meeting";
    }
}

</script>

</body>
</html>
