<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Meeting</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.card{
    background:white;
    padding:30px;
    border-radius:18px;
    width:420px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

/* TITLE */
h2{
    margin-bottom:20px;
    color:#0f172a;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:14px;
}

/* BUTTON */
button{
    width:100%;
    margin-top:18px;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* MESSAGE */
#msg{
    margin-top:12px;
    font-size:14px;
    color:#16a34a;
    font-weight:600;
    text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h2>Create Meeting</h2>

<input id="title" placeholder="Meeting Title">
<input id="link" placeholder="Meeting Link">

<button onclick="createMeeting()">Create Meeting</button>

<p id="msg"></p>

</div>

<script>

const access = localStorage.getItem("access");

function authFetch(url, options = {}) {
    return fetch(url, {
        ...options,
        headers: {
            "Content-Type": "application/json",
            ...(options.headers || {}),
            ...(access ? { "Authorization": "Bearer " + access } : {})
        }
    }).then(async res => {
        const data = await res.json().catch(() => ({}));

        if (res.status === 401) {
            window.location.href = "/accounts/login/";
        }

        return { res, data };
    });
}

function getCookie(n){
    let v = null;
    document.cookie.split(';').forEach(c => {
        if(c.trim().startsWith(n + '=')){
            v = decodeURIComponent(c.split('=')[1]);
        }
    });
    return v;
}

function createMeeting(){

    authFetch("/meetings/api/create/", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: JSON.stringify({
            title: document.getElementById("title").value,
            link: document.getElementById("link").value
        })
    })

    .then(({res, data}) => {

        if(res.status !== 201){
            document.getElementById("msg").style.color = "red";
            document.getElementById("msg").innerText =
                data.error || "Something went wrong";
            return;
        }

        document.getElementById("msg").style.color = "#16a34a";
        document.getElementById("msg").innerText = "Meeting created! Redirecting...";

        setTimeout(() => {
            window.location.href = "/meetings/";
        }, 800);
    })

    .catch(err => {
        console.log(err);
        document.getElementById("msg").style.color = "red";
        document.getElementById("msg").innerText = "Server error";
    });
}

</script>

</body>
</html>
