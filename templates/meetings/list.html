<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meetings</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

/* Header */
.header{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    padding:25px;
    border-radius:18px;
    margin-bottom:25px;
}

/* Grid */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:20px;
}

/* Card */
.card{
    background:white;
    padding:22px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
}

/* Title */
.title{
    font-size:18px;
    font-weight:600;
    color:#0f172a;
}

.sub{
    font-size:13px;
    color:#64748b;
    margin-top:4px;
}

/* Meta info */
.meta{
    margin-top:10px;
    font-size:13px;
    color:#475569;
}

/* Join button */
.join-btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 18px;
    background:#16a34a;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    font-size:14px;
}

.join-btn:hover{
    background:#15803d;
}

/* Create Button */
.create-btn{
    position:fixed;
    bottom:25px;
    right:25px;
    background:#2563eb;
    color:white;
    padding:16px 22px;
    border-radius:50px;
    text-decoration:none;
    font-weight:600;
    display:none;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

/* Top row */
.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:10px;
}

/* Actions */
.actions{
    display:flex;
    gap:8px;
}

.actions button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
}

/* Bigger buttons */
.edit{
    background:#f59e0b;
    color:white;
}

.del{
    background:#dc2626;
    color:white;
}

.edit:hover{background:#d97706;}
.del:hover{background:#b91c1c;}

</style>
</head>
<body>

<div class="header">
    <h1>Live Meetings</h1>
    <p>Join your active classes before they expire</p>
</div>

<div class="container" id="meetings"></div>

<a href="/meetings/create/" class="create-btn" id="createBtn">
    + Create Meeting
</a>

<script>

let user = {};

function getCookie(name){
    let v=null;
    document.cookie.split(';').forEach(c=>{
        if(c.trim().startsWith(name+'=')){
            v=decodeURIComponent(c.trim().split('=')[1]);
        }
    });
    return v;
}

/* USER */
function loadUser(){
    return fetch("/core/api/dashboard/")
    .then(r=>r.json())
    .then(d=>{
        user=d;
        if(user.role==="teacher"||user.is_superuser){
            document.getElementById("createBtn").style.display="block";
        }
    });
}

/* MEETINGS */
function loadMeetings(){

    fetch("/meetings/api/")
    .then(r=>r.json())
    .then(data=>{

        let box=document.getElementById("meetings");
        box.innerHTML="";

        data.forEach(m=>{

            let canEdit =
                user.is_superuser ||
                m.teacher_name === user.name;

            box.innerHTML += `
            <div class="card">

                <div class="top">

                    <div>
                        <div class="title">${m.title}</div>
                        <div class="sub">Teacher: ${m.teacher_name}</div>
                    </div>

                    ${canEdit ? `
                    <div class="actions">
                        <button class="edit" onclick="edit(${m.id})">Edit</button>
                        <button class="del" onclick="del(${m.id})">Delete</button>
                    </div>` : ""}

                </div>

                <div class="meta">
                    Created: ${new Date(m.created_at).toLocaleString()}
                </div>

                <div class="meta">
                    Expires: ${new Date(m.expires_at).toLocaleString()}
                </div>

                <a class="join-btn"
                   href="${m.link}"
                   target="_blank"
                   onclick="return check('${m.expires_at}')">
                   Join Meeting
                </a>

            </div>`;
        });

    });

}

/* EXPIRY CHECK */
function check(exp){
    if(new Date()>new Date(exp)){
        alert("This meeting has expired!");
        return false;
    }
    return true;
}

/* DELETE */
function del(id){
    fetch(`/meetings/api/delete/${id}/`,{
        method:"DELETE",
        headers:{"X-CSRFToken":getCookie("csrftoken")}
    }).then(()=>loadMeetings());
}

/* EDIT */
function edit(id){
    window.location.href=`/meetings/edit/${id}/`;
}

/* INIT */
loadUser().then(loadMeetings);

</script>

</body>
</html>
