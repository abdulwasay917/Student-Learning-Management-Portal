<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

.reset-card{
    width:100%;
    max-width:450px;
    background:#ffffff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h2{
    color:#0f172a;
    font-size:30px;
    font-weight:700;
}

.header p{
    margin-top:8px;
    color:#64748b;
    font-size:14px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-size:14px;
    font-weight:600;
}

.form-control{
    width:100%;
    padding:14px 16px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    font-size:15px;
    transition:.3s;
}

.form-control:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

.btn{
    width:100%;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn-primary{
    background:#2563eb;
    color:#fff;
}

.btn-primary:hover{
    background:#1d4ed8;
}

.btn-danger{
    background:#ef4444;
    color:#fff;
    margin-top:12px;
}

.btn-danger:hover{
    background:#dc2626;
}

#msg{
    margin-top:18px;
    text-align:center;
    min-height:20px;
    font-size:14px;
    color:#dc2626;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
    font-size:13px;
}

@media(max-width:480px){
    .reset-card{
        padding:28px;
    }

    .header h2{
        font-size:26px;
    }
}
</style>

</head>
<body>

<div class="reset-card">

    <div class="header">
        <h2>Reset Password</h2>
        <p>Create a new secure password for your account</p>
    </div>

    {% csrf_token %}

    <div class="form-group">
        <label>New Password</label>
        <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Enter new password">
    </div>

    <button class="btn btn-primary" onclick="resetPassword()">
        Reset Password
    </button>

    <p id="msg"></p>

    <div class="footer">
        Secure Password Recovery Portal
    </div>

</div>

<script>

/* =========================
   MESSAGE HANDLER
========================= */
function showMsg(text, type = "error") {

    const msg = document.getElementById("msg");
    msg.innerText = text;

    msg.style.color = type === "success" ? "#16a34a" : "#dc2626";
}

/* =========================
   EXTRACT UID + TOKEN
========================= */
function getUidToken() {

    const parts = window.location.pathname.split("/").filter(Boolean);

    return {
        uid: parts[parts.length - 2],
        token: parts[parts.length - 1]
    };
}

/* =========================
   VALIDATE PASSWORD
========================= */
function validatePassword(password) {

    if (!password) return "Enter new password";

    if (password.length < 6) {
        return "Password must be at least 6 characters";
    }

    return null;
}

/* =========================
   RESET PASSWORD
========================= */
async function resetPassword() {

    const btn = document.querySelector(".btn-primary");
    const password = document.getElementById("password").value.trim();

    showMsg("");

    /* validation */
    const error = validatePassword(password);
    if (error) {
        showMsg(error, "error");
        return;
    }

    const { uid, token } = getUidToken();

    btn.disabled = true;
    btn.innerText = "Resetting...";

    try {

        const res = await fetch(
            `/accounts/api/reset-password/${uid}/${token}/`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ password })
            }
        );

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
            showMsg(
                data.error || data.detail || data.message || "Reset failed",
                "error"
            );
            return;
        }

        showMsg(data.message || "Password reset successful", "success");

        setTimeout(() => {
            window.location.href = "/accounts/login/";
        }, 1200);

    } catch (err) {

        console.error(err);
        showMsg("Network error", "error");

    } finally {

        btn.disabled = false;
        btn.innerText = "Reset Password";
    }
}

</script>

</body>
</html>
