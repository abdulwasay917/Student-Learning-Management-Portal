<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teachers List</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f8fafc;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:28px;
    font-weight:700;
    color:#0f172a;
}

.back-btn{
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:10px 16px;
    border-radius:8px;
}

.card{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    color:white;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-bottom:1px solid #e2e8f0;
}

tr:hover{
    background:#f8fafc;
}

.delete-btn{
    background:#dc2626;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.empty{
    text-align:center;
    padding:30px;
    color:#64748b;
}

</style>
</head>
<body>

<div class="header">

    <h1 class="title">
        Teachers List
    </h1>

    <a href="/core/dashboard/" class="back-btn">
        Back to Dashboard
    </a>

</div>

<div class="card">

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Expertise</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="teachers-table">

            <tr>
                <td colspan="6" class="empty">
                    Loading teachers...
                </td>
            </tr>

        </tbody>

    </table>

</div>

<script>

async function refreshAccessToken() {

    const refresh = localStorage.getItem("refresh");
    if (!refresh) return false;

    try {
        const res = await fetch("/token/refresh/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refresh })
        });

        if (!res.ok) return false;

        const data = await res.json();

        localStorage.setItem("access", data.access);

        if (data.refresh) {
            localStorage.setItem("refresh", data.refresh);
        }

        return true;

    } catch (err) {
        console.error(err);
        return false;
    }
}


/* UNIFIED AUTH FETCH */
async function authFetch(url, options = {}) {

    let access = localStorage.getItem("access");

    let response = await fetch(url, {
        ...options,
        headers: {
            ...(options.headers || {}),
            ...(access ? { "Authorization": "Bearer " + access } : {})
        }
    });

    if (response.status === 401) {

        const refreshed = await refreshAccessToken();

        if (!refreshed) {
            localStorage.removeItem("access");
            localStorage.removeItem("refresh");
            window.location.href = "/accounts/login/";
            return response;
        }

        access = localStorage.getItem("access");

        response = await fetch(url, {
            ...options,
            headers: {
                ...(options.headers || {}),
                ...(access ? { "Authorization": "Bearer " + access } : {})
            }
        });
    }

    return response;
}


/* LOAD TEACHERS */
async function loadTeachers() {

    const res = await authFetch("/accounts/api/teachers/");

    if (res.status === 401) {
        alert("Session expired or unauthorized. Please login again.");
        window.location.href = "/accounts/login/";
        return;
    }

    const data = await res.json().catch(() => []);

    let tbody = document.getElementById("teachers-table");

    if (!data || data.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="6" class="empty">
                    No teachers found
                </td>
            </tr>
        `;
        return;
    }

    let rows = "";

    data.forEach(teacher => {

        rows += `
            <tr>
                <td>${teacher.name}</td>
                <td>${teacher.username}</td>
                <td>${teacher.email}</td>
                <td>${teacher.phone || "N/A"}</td>
                <td>${teacher.expertise || "N/A"}</td>
                <td>
                    <button class="delete-btn"
                        onclick="deleteUser(${teacher.user_id})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });

    tbody.innerHTML = rows;
}


/* DELETE USER */
function deleteUser(userId){

    if(!confirm("Delete this teacher?")) return;

    authFetch(`/accounts/api/delete-user/${userId}/`, {
        method: "DELETE"
    })
    .then(async res => {

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
            alert(data.error || "Delete failed");
            return;
        }

        alert(data.message || "Deleted successfully");

        loadTeachers(); // no full reload needed
    })
    .catch(err => {
        console.error(err);
        alert("Request failed");
    });
}


/* INIT */
loadTeachers();

</script>

</body>
</html>
