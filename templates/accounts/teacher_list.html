<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teachers List</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f8fafc;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:28px;
    font-weight:700;
    color:#0f172a;
}

.back-btn{
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:10px 16px;
    border-radius:8px;
}

.card{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    color:white;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-bottom:1px solid #e2e8f0;
}

tr:hover{
    background:#f8fafc;
}

.delete-btn{
    background:#dc2626;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.empty{
    text-align:center;
    padding:30px;
    color:#64748b;
}

</style>
</head>
<body>

<div class="header">

    <h1 class="title">
        Teachers List
    </h1>

    <a href="/core/dashboard/" class="back-btn">
        Back to Dashboard
    </a>

</div>

<div class="card">

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Expertise</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="teachers-table">

            <tr>
                <td colspan="6" class="empty">
                    Loading teachers...
                </td>
            </tr>

        </tbody>

    </table>

</div>

<script>

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');

        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();

            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

fetch("/accounts/api/teachers/", {
    credentials: "include"
})
.then(res => res.json())
.then(data => {

    let rows = "";

    if(data.length === 0){
        rows = `
            <tr>
                <td colspan="6" class="empty">
                    No teachers found
                </td>
            </tr>
        `;
    }

    data.forEach(teacher => {

        rows += `
            <tr>
                <td>${teacher.name}</td>
                <td>${teacher.username}</td>
                <td>${teacher.email}</td>
                <td>${teacher.phone || "N/A"}</td>
                <td>${teacher.expertise || "N/A"}</td>
                <td>
                    <button class="delete-btn"
                        onclick="deleteUser(${teacher.user_id})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });

    document.getElementById("teachers-table").innerHTML = rows;

});

function deleteUser(userId){

    if(!confirm("Delete this teacher?")){
        return;
    }

    fetch(`/accounts/api/delete-user/${userId}/`,{
        method:"DELETE",
        credentials: "include",
        headers: {
            "X-CSRFToken": getCookie("csrftoken"),
            "Content-Type": "application/json"
        }
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || data.error);
        location.reload();
    })
    .catch(err => {
        console.log(err);
        alert("Delete failed");
    });

}

</script>

</body>
</html>
