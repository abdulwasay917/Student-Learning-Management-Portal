<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

.login-card{
    width:100%;
    max-width:420px;
    background:#ffffff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h2{
    color:#0f172a;
    font-size:30px;
    font-weight:700;
}

.logo p{
    color:#64748b;
    margin-top:8px;
    font-size:14px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-weight:600;
    font-size:14px;
}

.form-control{
    width:100%;
    padding:14px 16px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    font-size:15px;
    transition:.3s;
}

.form-control:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    background:#1d4ed8;
}

.forgot-password{
    text-align:right;
    margin-top:12px;
}

.forgot-password a{
    text-decoration:none;
    color:#2563eb;
    font-size:14px;
    font-weight:500;
    transition:.3s;
}

.forgot-password a:hover{
    color:#1d4ed8;
    text-decoration:underline;
}

#msg{
    margin-top:18px;
    text-align:center;
    font-size:14px;
    min-height:20px;
    color:#dc2626;
}

.footer-text{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
    font-size:13px;
}

@media(max-width:480px){
    .login-card{
        padding:28px;
    }

    .logo h2{
        font-size:26px;
    }
}
</style>

</head>
<body>

<div class="login-card">
    <div class="logo">
        <h2>Welcome Back</h2>
        <p>Sign in to access your dashboard</p>
    </div>

    {% csrf_token %}

    <div class="form-group">
        <label>Username</label>
        <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Enter your username">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Enter your password">
    </div>

    <button class="login-btn" onclick="loginUser()">
        Login
    </button>

    <div class="forgot-password">
        <a href="/accounts/forgot-password/">
            Forgot Password?
        </a>
    </div>

    <p id="msg"></p>

    <div class="footer-text">
        Secure Authentication Portal
    </div>
</div>

<script>

function getCookie(name) {
    let cookieValue = null;

    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');

        for (let cookie of cookies) {
            cookie = cookie.trim();

            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }

    return cookieValue;
}


/* LOGIN */
async function loginUser() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");
    const btn = document.querySelector(".login-btn");

    msg.innerText = "";
    msg.style.color = "#dc2626";

    if (!username || !password) {
        msg.innerText = "Please fill all fields";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Logging in...";

    try {

        const res = await fetch("/accounts/api/login/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken")
            },
            body: JSON.stringify({
                username,
                password
            })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
            msg.innerText = data.detail || data.error || "Login failed";
            return;
        }

        if (data.access) {
            localStorage.setItem("access", data.access);
        }

        if (data.refresh) {
            localStorage.setItem("refresh", data.refresh);
        }

        msg.style.color = "#16a34a";
        msg.innerText = data.message || "Login successful";

        setTimeout(() => {
            window.location.href = "/core/dashboard/";
        }, 700);

    } catch (err) {
        console.error(err);
        msg.innerText = "Network error";

    } finally {
        btn.disabled = false;
        btn.innerText = "Login";
    }
}

</script>

</body>
</html>
