<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

.login-card{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h2{
    color:#0f172a;
    font-size:30px;
    font-weight:700;
}

.logo p{
    color:#64748b;
    margin-top:8px;
    font-size:14px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-weight:600;
    font-size:14px;
}

.form-control{
    width:100%;
    padding:14px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    font-size:15px;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.login-btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

#msg{
    margin-top:15px;
    text-align:center;
    font-size:14px;
    min-height:20px;
}

</style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <h2>Welcome Back</h2>
        <p>Secure Login Portal</p>
    </div>

    {% csrf_token %}

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" class="form-control">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control">
    </div>

    <button class="login-btn" onclick="loginUser()">Login</button>

    <p id="msg"></p>
</div>

<script>
/* =========================
   🔑 YOUR PUBLIC KEY HERE
========================= */
const PUBLIC_KEY = `-----BEGIN PUBLIC KEY-----
MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAyi/uHP7Cea0ONcdBGJPP
Am0s58A0JISs5zuhnrDoELCfijKbifEfGu+HA4W6HW5OtDeIuV0Xg2suVOhhi3tX
3ygH+l7nCm6PYpDnBJG37o2vla+Gt2ionI/0CFZ9zRFil+1spdO1tb9Lsqz3EGV0
fQZ/HKIlsw+Gltly/ThXO9Qe+3+akIWrfIlQ4B0G+VDA6BOVVXSweNIdBlea+9AP
rb+t2BcasPvrEBVDwSGQT5YkAqHX5AOuU8teQyj5TPw8uPTVukWKfgRNjvHchp1y
jd4ynEwwFw79PseDGNaxIBGmAk8/9NxBqxn2DOvMwqPao7bn4iVBowUEymVJ0x45
6QIDAQAB
-----END PUBLIC KEY-----`;

/* =========================
   Convert PEM → CryptoKey
========================= */
async function importPublicKey(pem) {
    const binary = window.atob(
        pem.replace(/-----[^-]+-----/g, "").replace(/\s/g, "")
    );

    const bytes = new Uint8Array([...binary].map(c => c.charCodeAt(0)));

    return await window.crypto.subtle.importKey(
        "spki",
        bytes.buffer,
        {
            name: "RSA-OAEP",
            hash: "SHA-256"
        },
        false,
        ["encrypt"]
    );
}

/* =========================
   Encrypt password
========================= */
async function encryptPassword(password) {
    const key = await importPublicKey(PUBLIC_KEY);

    const encoded = new TextEncoder().encode(password);

    const encrypted = await window.crypto.subtle.encrypt(
        { name: "RSA-OAEP" },
        key,
        encoded
    );

    return btoa(String.fromCharCode(...new Uint8Array(encrypted)));
}

/* =========================
   LOGIN FUNCTION
========================= */
async function loginUser() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");
    const btn = document.querySelector(".login-btn");

    msg.innerText = "";

    if (!username || !password) {
        msg.innerText = "Please fill all fields";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Encrypting...";

    try {

        const encryptedPassword = await encryptPassword(password);

        btn.innerText = "Logging in...";

        const res = await fetch("/accounts/api/login/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                password: encryptedPassword
            })
        });

        const data = await res.json();

        if (!res.ok) {
            msg.innerText = data.detail || "Login failed";
            return;
        }

        localStorage.setItem("access_token", data.access || "");
        localStorage.setItem("refresh_token", data.refresh || "");

        msg.style.color = "green";
        msg.innerText = "Login successful";

        setTimeout(() => {
            window.location.href = "/core/dashboard/";
        }, 700);

    } catch (err) {
        console.error(err);
        msg.innerText = "Network error";

    } finally {
        btn.disabled = false;
        btn.innerText = "Login";
    }
}
</script>

</body>
</html>
