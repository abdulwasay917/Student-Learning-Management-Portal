<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Students List</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f8fafc;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:28px;
    font-weight:700;
    color:#0f172a;
}

.back-btn{
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:10px 16px;
    border-radius:8px;
}

.card{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    color:white;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-bottom:1px solid #e2e8f0;
}

tr:hover{
    background:#f8fafc;
}

.empty{
    text-align:center;
    padding:30px;
    color:#64748b;
}

.delete-btn{
    background:#dc2626;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.delete-btn:hover{
    opacity:.9;
}

</style>

</head>
<body>

<div class="header">

    <h1 class="title">
        Students List
    </h1>

    <a href="/core/dashboard/" class="back-btn">
        Back to Dashboard
    </a>

</div>

<div class="card">

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Roll Number</th>
                <th id="action-header" style="display:none;">
                    Action
                </th>
            </tr>
        </thead>

        <tbody id="students-table">

            <tr>
                <td colspan="7" class="empty">
                    Loading students...
                </td>
            </tr>

        </tbody>

    </table>

</div>

<script>

/* =========================
   TOKEN HELPERS
========================= */
function getAccessToken() {
    return localStorage.getItem("access_token");
}

function getRefreshToken() {
    return localStorage.getItem("refresh_token");
}

/* =========================
   REFRESH TOKEN
========================= */
async function refreshAccessToken() {

    const refresh = getRefreshToken();
    if (!refresh) return false;

    try {
        const res = await fetch("/token/refresh/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ refresh })
        });

        if (!res.ok) return false;

        const data = await res.json();

        localStorage.setItem("access_token", data.access);

        if (data.refresh) {
            localStorage.setItem("refresh_token", data.refresh);
        }

        return true;

    } catch (err) {
        console.error(err);
        return false;
    }
}

/* =========================
   AUTH FETCH (REUSABLE)
========================= */
async function authFetch(url, options = {}) {

    let access = getAccessToken();

    let response = await fetch(url, {
        ...options,
        headers: {
            ...(options.headers || {}),
            "Accept": "application/json",
            ...(access ? {
                "Authorization": "Bearer " + access
            } : {})
        }
    });

    if (response.status === 401) {

        const refreshed = await refreshAccessToken();

        if (!refreshed) {
            localStorage.removeItem("access_token");
            localStorage.removeItem("refresh_token");
            window.location.href = "/accounts/login/";
            return;
        }

        access = getAccessToken();

        response = await fetch(url, {
            ...options,
            headers: {
                ...(options.headers || {}),
                "Accept": "application/json",
                "Authorization": "Bearer " + access
            }
        });
    }

    return response;
}

/* =========================
   LOAD STUDENTS
========================= */
async function loadStudents() {

    try {

        const res = await authFetch("/accounts/api/students/");

        if (!res || res.status === 401) {
            window.location.href = "/accounts/login/";
            return;
        }

        const data = await res.json().catch(() => ({}));

        const students = data.students || [];
        const isSuperuser = data.is_superuser;

        /* toggle action column */
        const actionHeader = document.getElementById("action-header");
        if (actionHeader) {
            actionHeader.style.display = isSuperuser ? "" : "none";
        }

        let rows = "";

        if (!students.length) {

            rows = `
                <tr>
                    <td colspan="7" class="empty">
                        No students found
                    </td>
                </tr>
            `;

        } else {

            students.forEach(student => {

                rows += `
                    <tr>
                        <td>${student.id}</td>
                        <td>${student.name}</td>
                        <td>${student.username}</td>
                        <td>${student.email}</td>
                        <td>${student.phone || "N/A"}</td>
                        <td>${student.roll_number || "N/A"}</td>
                `;

                if (isSuperuser) {
                    rows += `
                        <td>
                            <button class="delete-btn"
                                onclick="deleteUser(${student.user_id})">
                                Delete
                            </button>
                        </td>
                    `;
                }

                rows += `</tr>`;
            });
        }

        document.getElementById("students-table").innerHTML = rows;

    } catch (err) {
        console.error(err);
    }
}

/* =========================
   DELETE USER
========================= */
async function deleteUser(userId) {

    if (!confirm("Are you sure you want to delete this user?")) return;

    try {

        const res = await authFetch(`/accounts/api/delete-user/${userId}/`, {
            method: "DELETE"
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
            alert(data.error || "Delete failed");
            return;
        }

        alert(data.message || "Deleted successfully");

        loadStudents(); // refresh list

    } catch (err) {
        console.error(err);
        alert("Request failed");
    }
}

/* =========================
   INIT
========================= */
loadStudents();

</script>

</body>
</html>
