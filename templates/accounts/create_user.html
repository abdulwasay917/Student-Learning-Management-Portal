<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            padding: 20px;
        }

        .create-card {
            width: 100%;
            max-width: 650px;
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo h2 {
            color: #0f172a;
            font-size: 30px;
            font-weight: 700;
        }

        .logo p {
            color: #64748b;
            margin-top: 8px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 600;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dbe2ea;
            border-radius: 12px;
            font-size: 15px;
            transition: .3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
        }

        .role-section {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 18px;
        }

        .role-section h3 {
            color: #0f172a;
            margin-bottom: 15px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        #msg {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
        }

        .success { color: #16a34a; }
        .error { color: #dc2626; }

        .footer-text {
            margin-top: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .create-card { padding: 30px; }
            .logo h2 { font-size: 26px; }
        }
    </style>
</head>
<body>
<div class="create-card">
    <div class="logo">
        <h2>Create User</h2>
        <p>Create Teacher or Student Account</p>
    </div>

    {% csrf_token %}

    <div class="form-group">
        <label>Select Role</label>
        <select id="role" class="form-control" onchange="toggleFields()">
            <option value="">Select Role</option>
            <option value="teacher">Teacher</option>
            <option value="student">Student</option>
        </select>
    </div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="Enter full name">
    </div>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter email">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password">
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" class="form-control" placeholder="Enter phone number">
    </div>

    <div id="teacher-fields" class="role-section" style="display:none;">
        <h3>Teacher Information</h3>
        <div class="form-group">
            <label>Bio</label>
            <textarea id="bio" class="form-control" rows="4" placeholder="Teacher bio"></textarea>
        </div>
        <div class="form-group">
            <label>Expertise</label>
            <input type="text" id="expertise" class="form-control" placeholder="Enter expertise">
        </div>
    </div>

    <div id="student-fields" class="role-section" style="display:none;">
        <h3>Student Information</h3>
        <div class="form-group">
            <label>Roll Number</label>
            <input type="text" id="roll_number" class="form-control" placeholder="Enter roll number">
        </div>
    </div>

    <button class="submit-btn" onclick="createUser()">Create User</button>
    <p id="msg"></p>
    <div class="footer-text">LMS Administration Panel</div>
</div>

<script>

function getCookie(name) {
    let cookieValue = null;

    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');

        for (let cookie of cookies) {
            cookie = cookie.trim();

            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }

    return cookieValue;
}


/* TOGGLE FIELDS */
function toggleFields() {

    const role = document.getElementById("role").value;

    document.getElementById("teacher-fields").style.display = "none";
    document.getElementById("student-fields").style.display = "none";

    if (role === "teacher") {
        document.getElementById("teacher-fields").style.display = "block";
    }

    if (role === "student") {
        document.getElementById("student-fields").style.display = "block";
    }
}


/* CREATE USER */
async function createUser() {

    const btn = document.querySelector(".submit-btn");
    const msg = document.getElementById("msg");

    const token = localStorage.getItem("access");

    const role = document.getElementById("role").value;
    const name = document.getElementById("name").value.trim();
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const phone = document.getElementById("phone").value.trim();

    const bio = document.getElementById("bio")?.value.trim() || "";
    const expertise = document.getElementById("expertise")?.value.trim() || "";
    const roll_number = document.getElementById("roll_number")?.value.trim() || "";

    msg.innerText = "";
    msg.className = "";

    /* VALIDATION */
    if (!role || !name || !username || !email || !password) {
        msg.className = "error";
        msg.innerText = "Please fill all required fields";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Creating...";

    try {

        const res = await fetch("/accounts/api/create-user/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                ...(token ? { "Authorization": "Bearer " + token } : {})
            },
            body: JSON.stringify({
                role,
                name,
                username,
                email,
                password,
                phone,
                bio,
                expertise,
                roll_number
            })
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok) {

            msg.className = "success";
            msg.innerText = data.message || "User created successfully";

            setTimeout(() => {
                window.location.href = "/core/dashboard/";
            }, 900);

        } else {

            msg.className = "error";
            msg.innerText = data.error || data.detail || "Creation failed";
        }

    } catch (err) {

        console.error(err);
        msg.className = "error";
        msg.innerText = "Network error";

    } finally {

        btn.disabled = false;
        btn.innerText = "Create User";
    }
}

</script>
</body>
</html>
