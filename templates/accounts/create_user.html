```
<h2>Create User (Admin Only)</h2>

{% csrf_token %}

<label>Select Role</label>

<select id="role" onchange="toggleFields()">
    <option value="">Select Role</option>
    <option value="teacher">Teacher</option>
    <option value="student">Student</option>
</select>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="username" placeholder="Username">

<input type="email" id="email" placeholder="Email Address">

<input type="password" id="password" placeholder="Password">

<input type="text" id="phone" placeholder="Phone Number">

<div id="teacher-fields" class="section" style="display:none;">

    <h3>Teacher Information</h3>

    <textarea
        id="bio"
        rows="4"
        placeholder="Teacher Bio"></textarea>

    <input
        type="text"
        id="expertise"
        placeholder="Expertise">

</div>

<div id="student-fields" class="section" style="display:none;">

    <h3>Student Information</h3>

    <input
        type="text"
        id="roll_number"
        placeholder="Roll Number">

</div>

<button onclick="createUser()">
    Create User
</button>

<p id="msg"></p>
```

</div>

<script>

function getCookie(name) {

    let cookieValue = null;

    if (document.cookie && document.cookie !== '') {

        const cookies = document.cookie.split(';');

        for (let i = 0; i < cookies.length; i++) {

            const cookie = cookies[i].trim();

            if (
                cookie.substring(
                    0,
                    name.length + 1
                ) === (name + '=')
            ) {

                cookieValue = decodeURIComponent(
                    cookie.substring(
                        name.length + 1
                    )
                );

                break;
            }
        }
    }

    return cookieValue;
}

function toggleFields() {

    const role =
        document.getElementById("role").value;

    document.getElementById(
        "teacher-fields"
    ).style.display = "none";

    document.getElementById(
        "student-fields"
    ).style.display = "none";

    if(role === "teacher"){

        document.getElementById(
            "teacher-fields"
        ).style.display = "block";
    }

    if(role === "student"){

        document.getElementById(
            "student-fields"
        ).style.display = "block";
    }
}

function createUser() {

    const role =
        document.getElementById("role").value;

    let payload = {

        role: role,

        name:
            document.getElementById(
                "name"
            ).value,

        username:
            document.getElementById(
                "username"
            ).value,

        email:
            document.getElementById(
                "email"
            ).value,

        password:
            document.getElementById(
                "password"
            ).value,

        phone:
            document.getElementById(
                "phone"
            ).value
    };

    if(role === "teacher"){

        payload.bio =
            document.getElementById(
                "bio"
            ).value;

        payload.expertise =
            document.getElementById(
                "expertise"
            ).value;
    }

    if(role === "student"){

        payload.roll_number =
            document.getElementById(
                "roll_number"
            ).value;
    }

    fetch("/accounts/api/create-user/", {

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken":
                getCookie("csrftoken")
        },

        body:JSON.stringify(payload)

    })

    .then(async res => {

        const data = await res.json();

        const msg =
            document.getElementById("msg");

        if(res.ok){

            msg.className = "success";

            msg.innerText =
                data.message ||
                "User created successfully";

        }else{

            msg.className = "error";

            msg.innerText =
                data.error ||
                data.detail ||
                "Something went wrong";
        }

    })

    .catch(error => {

        console.error(error);

        const msg =
            document.getElementById("msg");

        msg.className = "error";

        msg.innerText =
            "Request failed";
    });
}

</script>
