<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

.card{
    width:100%;
    max-width:450px;
    background:#ffffff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h2{
    color:#0f172a;
    font-size:30px;
    font-weight:700;
}

.header p{
    margin-top:8px;
    color:#64748b;
    font-size:14px;
    line-height:1.5;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-size:14px;
    font-weight:600;
}

.form-control{
    width:100%;
    padding:14px 16px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    font-size:15px;
    transition:.3s;
}

.form-control:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.back-link{
    text-align:center;
    margin-top:16px;
}

.back-link a{
    color:#2563eb;
    text-decoration:none;
    font-size:14px;
    font-weight:500;
}

.back-link a:hover{
    text-decoration:underline;
}

#msg{
    margin-top:18px;
    text-align:center;
    min-height:20px;
    font-size:14px;
    color:#dc2626;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
    font-size:13px;
}

@media(max-width:480px){
    .card{
        padding:28px;
    }

    .header h2{
        font-size:26px;
    }
}
</style>

</head>
<body>

<div class="card">

```
<div class="header">
    <h2>Forgot Password</h2>
    <p>
        Enter your registered email address and we'll send you
        a password reset link.
    </p>
</div>

{% csrf_token %}

<div class="form-group">
    <label>Email Address</label>
    <input
        type="email"
        id="email"
        class="form-control"
        placeholder="Enter your email address">
</div>

<button class="btn" onclick="sendReset()">
    Send Reset Link
</button>

<div class="back-link">
    <a href="/accounts/login/">
        Back to Login
    </a>
</div>

<p id="msg"></p>

<div class="footer">
    Secure Password Recovery System
</div>
```

</div>

<script>
function getCookie(name) {
    let cookieValue = null;

    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');

        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();

            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(
                    cookie.substring(name.length + 1)
                );
                break;
            }
        }
    }

    return cookieValue;
}

function sendReset() {
    fetch("/accounts/api/forgot-password/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: JSON.stringify({
            email: document.getElementById("email").value
        })
    })
    .then(async res => {
        const data = await res.json();

        if (res.ok) {
            document.getElementById("msg").style.color = "#16a34a";
        } else {
            document.getElementById("msg").style.color = "#dc2626";
        }

        document.getElementById("msg").innerText =
            data.message ||
            data.error ||
            data.detail ||
            "Something went wrong";

        console.log("Status:", res.status);
        console.log(data);
    })
    .catch(err => {
        console.log(err);
        document.getElementById("msg").style.color = "#dc2626";
        document.getElementById("msg").innerText = "Request failed";
    });
}
</script>

</body>
</html>
